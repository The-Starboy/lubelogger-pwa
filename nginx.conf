server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # HTML and service worker: always revalidate
    location ~* \.(html)$ {
        add_header Cache-Control "no-cache";
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    # CSS, JS, manifest: revalidate but allow caching
    location ~* \.(js|css|json)$ {
        add_header Cache-Control "no-cache";
    }

    # Images: cache longer (rarely change)
    location ~* \.(png|ico|svg)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
